name: telegem-release

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2 # Critical for comparing version change

    - name: Check for version bump
      id: check_version
      run: |
        VERSION_FILE="lib/telegem.rb"
        
        # Extract version string from current commit
        NEW_VER=$(grep "VERSION =" $VERSION_FILE | sed -E 's/.*VERSION = "([^"]+)".*/\1/')
        
        # Extract version string from previous commit
        OLD_VER=$(git show HEAD~1:$VERSION_FILE | grep "VERSION =" | sed -E 's/.*VERSION = "([^"]+)".*/\1/')
        
        echo "Detected version change: $OLD_VER -> $NEW_VER"
        
        if [ "$OLD_VER" != "$NEW_VER" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Ruby 3.2
      if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4.9
        
    - name: gem install
     run: |
       gem install
     
    - name: Publish to GPR (GitHub Packages)
      if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        mkdir -p $HOME/.gem
        printf -- "---\n:github: Bearer ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
        chmod 0600 $HOME/.gem/credentials
        gem build *.gemspec
        gem push --KEY github --host https://rubygems.pkg.github.com/${OWNER} *.gem
      env:
        GEM_HOST_API_KEY: "${{secrets.GITHUB_TOKEN}}"
        OWNER: ${{ github.repository_owner }}

    - name: Publish to RubyGems
      if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        # Append RubyGems key to the credentials file created in the previous step
        printf -- ":rubygems_api_key: ${RUBYGEMS_KEY}\n" >> $HOME/.gem/credentials
        gem push *.gem
      env:
        RUBYGEMS_KEY: "${{secrets.RUBYGEMS_AUTH_TOKEN}}"
