image: ruby:3.2

pages:
  stage: deploy
  script:
    - gem install kramdown

    
    
    - kramdown README.md > public/index.html
    
    - for file in docs_src/*.md; do
        filename=$(basename "$file" .md)
        kramdown "$file" > "public/${filename}.html"
      done
    
    - for html in public/*.html; do
        NAV='<nav style="background 
                <a href="/">🏠 Home</a> |
                <a href="/getting-started.html">🚀 Getting Started</a> |
                <a href="/bot-api.html">🤖 Bot API</a> |
                <a href="/context-api.html">🎯 Context API</a> |
                <a href="/hall-of-fame.html">🏆 Hall of Fame</a>
             </nav>'
    
        sed -i "s|<body>|<body>${NAV}|" "$html"
      done
    
  artifacts:
    paths:
      - public
  only:
    - main